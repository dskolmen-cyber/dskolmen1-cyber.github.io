<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <title>Приглашение на свадьбу</title>
    <style>
      body {
        font-family: 'Georgia', serif;
        /* Фоновая картинка: нежные цветы, мягкий свет */
        background-image: url('https://i.pinimg.com/originals/6e/e5/22/6ee522ea18d46ddd1d43e662ce2ff98c.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #4a2a3e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      /* Полупрозрачная подложка, чтобы текст и карточка читались поверх фото */
      .overlay {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.75);
        z-index: 1;
      }

      .petal {
        position: absolute;
        width: 0;
        height: 0;
        border-left: 35px solid transparent;
        border-right: 35px solid transparent;
        border-bottom: 60px solid #fff0f4;
        transform-origin: bottom center;
        opacity: 0.4;
        animation: float 20s infinite linear, sway 4s infinite ease-in-out;
        z-index: 2;
      }
      .petal:nth-child(2) { animation-delay: -8s; }
      .petal:nth-child(3) { animation-delay: -16s; }

      @keyframes float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-90px) scale(0.85); }
      }
      @keyframes sway {
        0%, 100% { rotate: 0deg; }
        50% { rotate: 7deg; }
      }

      .card {
        background: rgba(255, 255, 255, 0.95);
        color: #4a2a3e;
        padding: 50px;
        border-radius: 28px;
        max-width: 660px;
        box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
        position: relative;
        z-index: 3;
        backdrop-filter: blur(8px); /* лёгкое размытие подложки */
      }
      h1 { font-size: 40px; margin-bottom: 14px; line-height: 1.1; }
      p { font-size: 19px; line-height: 1.6; }
      .date { font-weight: bold; color: #d4a373; font-size: 26px; }
    </style>
  </head>
  <body>
    <!-- Подложка поверх фото, чтобы текст был контрастным -->
    <div class="overlay"></div>

    <!-- Декоративные лепестки (теперь поверх подложки, но под карточкой) -->
    <div class="petal" style="top:8%; left:10%;"></div>
    <div class="petal" style="bottom:12%; right:15%; border-bottom-color:#fff7f9;"></div>
    <div class="petal" style="top:35%; right:8%; border-bottom-color:#fff2f6;"></div>

    <div class="card">
      <h1>Вы приглашены!</h1>
      <p>Мы счастливы разделить с вами самый важный день нашей жизни.</p>
      <p class="date">Дата: 08 августа 2026</p>
      <p>Место: ЗАГС г. Стерлитамак просп. Ленина 55</p>
      <p>Будем рады видеть вас с 14:45 до полуночи.</p>
    </div>
  </body>
</html>
